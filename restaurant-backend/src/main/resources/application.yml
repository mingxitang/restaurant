server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/restaurant_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}"
    username: "${SPRING_DATASOURCE_USERNAME:root}"
    password: "${SPRING_DATASOURCE_PASSWORD}"
    hikari:
      maximum-pool-size: "${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}"
      minimum-idle: "${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}"
      connection-timeout: "${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}"
      idle-timeout: "${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}"
      max-lifetime: "${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}"
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    redis:
      host: "${SPRING_DATA_REDIS_HOST:localhost}"
      port: "${SPRING_DATA_REDIS_PORT:6379}"
      timeout: "${SPRING_DATA_REDIS_TIMEOUT:3000ms}"
      lettuce:
        pool:
          max-active: "${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE:8}"
          max-idle: "${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE:8}"
          min-idle: "${SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE:2}"

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.restaurant.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: "${JWT_SECRET}"
  expiration-minutes: 1440

app:
  security:
    login-rate-limit:
      max-failures: ${LOGIN_RATE_LIMIT_MAX_FAILURES:5}
      window-minutes: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:10}
      lock-minutes: ${LOGIN_RATE_LIMIT_LOCK_MINUTES:10}
  cors:
    allowed-origins:
      - http://localhost:*
      - http://127.0.0.1:*
  # Windows default: false, use in-memory JWT blacklist.
  # Docker / WSL / Linux: true, use Redis blacklist and Redis CacheManager.
  redis:
    enabled: "${APP_REDIS_ENABLED:false}"
  wechat:
    app-id: ${WECHAT_APP_ID:}
    secret: ${WECHAT_APP_SECRET:}
